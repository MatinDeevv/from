[data]
chunk_size       = 2000000
window_size      = 512
stride           = 64
horizon          = 256
direction_threshold = 2.0
normalize_freeze_after = 100000

[costs]
# USD per troy ounce unless noted otherwise. Backtest commands must surface all
# three scenarios rather than claiming profitability from one optimistic cost.
spread_typical_usd   = 0.30
spread_elevated_usd  = 0.60
spread_extreme_usd   = 1.50
commission_per_lot   = 3.50
slippage_usd         = 0.05
lot_size             = 100

[inference]
confidence_threshold = 0.50

[augmentation]
enabled          = true
magnitude_prob   = 0.3
time_warp_prob   = 0.2
noise_prob       = 0.4
spread_shock_prob= 0.15
tick_dropout_prob= 0.2
regime_splice_prob= 0.1

[model]
conv_out_channels    = 256
lstm_hidden          = 512
lstm_layers          = 3
lstm_dropout         = 0.1
attention_heads      = 8
attention_d_model    = 512
attention_d_ff       = 2048
tft_blocks           = 3
moe_num_experts      = 16
moe_top_k            = 2
moe_expert_dim       = 512
hyperbolic_dim       = 64
poincare_curvature   = 1.0
kalman_state_dim     = 16
neural_ode_hidden    = 128
neural_ode_steps     = 10
dropout              = 0.1
activation           = "gelu"

[training]
batch_size           = 256
epochs               = 50
pretrain_epochs      = 10
learning_rate        = 0.00005
weight_decay         = 0.01
optimizer            = "adamw"
scheduler            = "cosine_warmup"
warmup_steps         = 1000
grad_clip_norm       = 1.0
rho_sam              = 0.05
use_sam              = true
use_pcgrad           = true
use_irm              = true
use_curriculum       = true
irm_warmup_steps     = 5000

[loss]
w_direction          = 1.0
w_quantile           = 0.5
w_volatility         = 0.3
w_spread             = 0.2
w_hawkes             = 0.1
w_contrastive        = 0.2
w_irm                = 0.1
w_load_balance       = 0.01
catastrophe_mult     = 3.0
quantiles            = [0.05, 0.1, 0.25, 0.5, 0.75, 0.9, 0.95]

[uncertainty]
mc_dropout_samples   = 30
ensemble_size        = 5
ood_threshold_pct    = 99.0

[regime]
environments         = ["london", "newyork", "asian", "high_vol", "low_vol", "trending", "ranging"]

[hardware]
num_workers          = 16
prefetch_depth       = 32
use_arena_allocator  = true
arena_size_mb        = 512
chunk_size           = 2000000
use_cuda             = true
cuda_device          = 0
mixed_precision      = true
grad_scale_init      = 65536.0
pin_memory           = true
stream_count         = 3
vram_pool_gb         = 3.0
avx2                 = true
openmp_threads       = 20

[io]
checkpoint_every     = 1000
keep_checkpoints     = 5
log_every            = 10
validate_every       = 500

